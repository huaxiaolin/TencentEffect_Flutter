group 'com.tencent.effect.tencent_effect_flutter'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
        maven {url 'https://jitpack.io'}
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:4.1.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven {url 'https://jitpack.io'}

    }
}

apply plugin: 'com.android.library'


import java.util.regex.Pattern

def getSubSpecFromPubspec() {
    def allowedVersions = ['A1-00', 'A1-01', 'A1-02', 'A1-03', 'A1-04', 'A1-05', 'A1-06',
                           'S1-00', 'S1-01', 'S1-02', 'S1-03', 'S1-04', 'S1-05', 'S1-06', 'S1-07']

    // rootProject.projectDir 通常是 [HostApp]/android/
    def hostProjectRoot = rootProject.projectDir.parentFile
    def pubspecFile = new File(hostProjectRoot, "pubspec.yaml")

    println("[TencentEffect] Target Host Pubspec: ${pubspecFile.absolutePath}")

    if (pubspecFile.exists()) {
        def content = pubspecFile.text
        def pattern = Pattern.compile("TencentEffect:\\s*\\n\\s*te_sub_spec:\\s*['\"]?([\\w-]+)['\"]?")
        def matcher = pattern.matcher(content)

        if (matcher.find()) {
            def result = matcher.group(1)
            println("[TencentEffect] get sub_specResult: ${result}")
            if (result in allowedVersions) {
                println("[TencentEffect] valid subSpecVersion: ${result}")
                return result
            } else {
                println("[TencentEffect] warning: invalid subSpecVersion '${result}', allowed: ${allowedVersions.join(', ')}")
                println("[TencentEffect] fallback to default: S1-07")
                return "S1-07"
            }
        } else {
            println("[TencentEffect] sub_spec not found\n: ${content}")
        }
    } else {
        println("[TencentEffect] pubspecFile not exists: ${pubspecFile}")
    }
    return "S1-07"
}

def subSpecVersion = getSubSpecFromPubspec()


android {
    if (project.android.hasProperty("namespace")) {
